<!DOCTYPE html>
<html>
<head>
    <title>Unresolved Pollution Issues</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
    <h1>Unresolved Pollution Issues</h1>
</header>
<div class="container">
    <label>Filter by Colony</label>
    <select id="colonyFilter" onchange="filterColony()">
        <option value="All">All Colonies</option>
    </select>
    <div id="issues"></div>
</div>
<script>
const API_URL = "http://localhost:3000";
let allReports = [];
async function loadIssues() {
    const res = await fetch(`${API_URL}/reports`);
    allReports = await res.json();
    populateColonies();
    displayIssues(allReports);
}
function populateColonies() {
    const dropdown = document.getElementById("colonyFilter");
    dropdown.innerHTML = '<option value="All">All Colonies</option>';
    const colonies = [...new Set(allReports.map(r => r.colony))];
    colonies.forEach(colony => {
        const option = document.createElement("option");
        option.value = colony;
        option.textContent = colony;
        dropdown.appendChild(option);
    });
}
function filterColony() {
    const selected = document.getElementById("colonyFilter").value;
    if (selected === "All") {
        displayIssues(allReports);
    } else {
        displayIssues(allReports.filter(r => r.colony === selected));
    }
}
function displayIssues(reports) {
    const container = document.getElementById("issues");
    container.innerHTML = "";
    reports
        .filter(r => r.status !== "Resolved")
        .forEach(report => {
            const div = document.createElement("div");
            div.className = "issue-card";
            div.innerHTML = `
                <h3>${report.issue_category}</h3>
                <p><b>Colony:</b> ${report.colony}</p>
                <p>${report.description}</p>
                <img src="http://localhost:3000/${report.image_url}" width="250">
                <div class="vote-buttons">
                    <button onclick="supportIssue('${report.id}')">
                        👍 Support Issue (${report.upvotes})
                    </button>
                </div>
            `;
            container.appendChild(div);
        });
}
async function supportIssue(id) {
    await fetch(`${API_URL}/upvote/${id}`, {
        method: "POST"
    });
    loadIssues();
}
loadIssues();
</script>
</body>
</html>
