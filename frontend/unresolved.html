<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unresolved Pollution Issues</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }
    header {
      background: #1976d2;
      color: white;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .issue-card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .issue-card img {
      margin-top: 10px;
      border-radius: 6px;
    }
    .vote-buttons {
      margin-top: 10px;
    }
    .vote-buttons button {
      padding: 8px 12px;
      margin-right: 10px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: white;
    }
    .upvote { background: #4caf50; }
    .downvote { background: #f44336; }
    select {
      padding: 8px;
      margin-bottom: 20px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <header>
    <h1>Unresolved Pollution Issues</h1>
    <p>Vote to prioritize problems in your colony</p>
  </header>
  <div class="container">
    <label><b>Filter by Colony</b></label>
    <br><br>
    <select id="colonyFilter" onchange="filterColony()">
      <option value="All">All Colonies</option>
    </select>
    <div id="issues"></div>
  </div>
  <script>
    const API_URL = "http://localhost:3000";
    let allReports = [];
    async function loadIssues() {
      const res = await fetch(`${API_URL}/reports`);
      allReports = await res.json();
      populateColonies();
      displayIssues(allReports);
    }
    function populateColonies() {
      const dropdown = document.getElementById("colonyFilter");
      dropdown.innerHTML = `<option value="All">All Colonies</option>`;
      const colonies = [...new Set(
        allReports
          .map(r => r.colony)
          .filter(c => c && c !== "Unknown")
      )];
      colonies.forEach(colony => {
        const option = document.createElement("option");
        option.value = colony;
        option.textContent = colony;
        dropdown.appendChild(option);
      });
    }
    function filterColony() {
      const selected = document.getElementById("colonyFilter").value;
      if (selected === "All") {
        displayIssues(allReports);
      } else {
        displayIssues(allReports.filter(r => r.colony === selected));
      }
    }
    function displayIssues(reports) {
      const container = document.getElementById("issues");
      container.innerHTML = "";
      reports
        .filter(r => r.status !== "Resolved")
        .forEach(report => {
          const div = document.createElement("div");
          div.className = "issue-card";
          div.innerHTML = `
            <h3>${report.issue_category}</h3>
            <p><b>Colony:</b> ${report.colony}</p>
            <p>${report.description}</p>
            <img src="${API_URL}/${report.image_url}" width="250">
            <div class="vote-buttons">
              <button class="upvote" onclick="upvote('${report.id}')">
                👍 ${report.upvotes}
              </button>
              <button class="downvote" onclick="downvote('${report.id}')">
                👎 ${report.downvotes}
              </button>
            </div>
          `;
          container.appendChild(div);
        });
    }
    async function upvote(id) {
      await fetch(`${API_URL}/upvote/${id}`, { method: "POST" });
      loadIssues();
    }
    async function downvote(id) {
      await fetch(`${API_URL}/downvote/${id}`, { method: "POST" });
      loadIssues();
    }
    loadIssues();
  </script>
</body>
</html>
